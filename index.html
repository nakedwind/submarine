<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>潛水艇尋寶</title>
<style>
  /* ===== 基本設定：整個網頁不能捲動、黑底 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #04182e;
    touch-action: manipulation; /* 防止手機雙擊放大 */
    font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
    user-select: none;
  }

  /* ===== 舞台：固定 1080x1920 的座標系統，再整體縮放到符合螢幕 ===== */
  #stage {
    position: absolute;
    width: 1080px; height: 1920px;
    left: 50%; top: 50%;
    transform-origin: center center;
    z-index: 0;
    isolation: isolate;
    overflow: hidden;   /* 遮罩：超出 1080x1920 舞台的東西一律裁掉 */
    /* 實際縮放比例由 JS 計算 */
  }

  /* ===== 場景容器：鏡頭拉遠（第10層鐵達尼號登場）時整體縮小 ===== */
  #world {
    position: absolute; left: 0; top: 0;
    width: 1080px; height: 1920px;
    transform-origin: 50% 42%;              /* 以畫面中間偏上為中心往後拉 */
    transition: transform 1.5s ease-in-out;
    z-index: 0;
  }
  #world.zoomout { transform: scale(0.9); }
  /* 壓黑層在 world 裡（才能讓潛水艇/寶箱浮在它上面），
     鏡頭拉遠時用反向放大抵銷縮小，看起來就像沒有跟著縮 */
  #depthTint { transform-origin: 50% 42%; }
  #world.zoomout #depthTint { transform: scale(1.1112); }
  #stage { background: #051428; }           /* 拉遠時邊緣露出的底色（深海色） */

  /* ===== 鐵達尼號：最深層的大獎，平常藏在畫面底下 ===== */
  #titanic {
    position: absolute;
    left: 0; top: 2450px;      /* 藏在畫面下方（130% 縮放的上緣也要在畫面外）；升起時由 JS 改 top */
    width: 1080px;             /* 素材原始尺寸 1080x2084 */
    z-index: 2;                /* 保持在深度濾鏡之上，鐵達尼號本體不被壓黑 */
    pointer-events: none;
    transform-origin: 50% 50%;
    transform: scale(1.4445);  /* 登場時的起始大小（換算鏡頭縮小後約 130%） */
  }

  /* 礁岩軌道永遠比畫面左緣多凸出 60px（見 #reefStrip / #chestStrip 的 left）：
     鏡頭縮小（最小 90%）時左邊也不會露縫，回捲時也沒有時間差破綻 */
  /* 第 10 層演出～回捲期間：再多凸 60（共 -120px），確保鏡頭縮放全程零縫隙 */
  #reefStrip.deepLeft, #chestStrip.deepLeft { left: -120px; }
  /* 最終下潛：第九層按下 SPIN 就開始，潛水艇用整段演出的時間慢慢縮小到約 50%。
     用「寬度」縮小而不是 transform scale——因為 transform 被 diveWobble 搖擺
     動畫佔用中，改 transform 不會有漸變效果；改寬度就能和搖擺並存。
     left/top 同步移動，讓它看起來以中心點縮小。 */
  #sub.diving.finalShrink {
    width: 384px;              /* 691 × 0.556 ≈ 384（換算鏡頭縮小後約 50%） */
    left: 547px; top: 139px;   /* 維持中心點 (739, 279) 不變 */
    transition: left 5.1s ease-in-out, top 5.1s ease-in-out, width 5.1s ease-in-out,
                filter 0.3s, opacity 0.5s;
  }

  /* ===== 背景圖（1080x3708 長條圖，下潛時往上捲動） ===== */
  #bg {
    position: absolute; left: 0; top: 0;
    width: 1080px; height: 3708px;
  }

  /* ===== 海面波浪（兩張圖左右相接，不斷往左移形成循環）===== */
  .sea-strip {
    position: absolute; left: 0;
    width: 4320px;
    display: flex;
  }
  .sea-strip img { width: 2160px; height: auto; flex: 0 0 2160px; margin-right: -2px; }
  /* 兩層海面都用素材原始高度，不再拉伸變形 */
  #seaBack  { top: 630px; height: 109px; opacity: 0.9; animation: seaMove 36s linear infinite; }
  #seaFront { top: 680px; height: 73px;  animation: seaMove 24s linear infinite reverse; }
  @keyframes seaMove {
    from { transform: translateX(0); }
    to   { transform: translateX(-2158px); }
  }

  /* ===== 陽光透進海裡的光束（初始畫面，海面正下方） ===== */
  #lightRays {
    position: absolute;
    left: 0; top: 738px;       /* 從海面波浪下緣開始 */
    width: 1080px; height: 950px;
    overflow: hidden;
    pointer-events: none;
  }
  .lightray {
    position: absolute;
    top: -80px;
    height: 1050px;
    background: linear-gradient(to bottom,
      rgba(255, 252, 224, 0.42),
      rgba(220, 245, 255, 0.18) 45%,
      rgba(220, 245, 255, 0) 80%);
    filter: blur(22px);                /* 大幅模糊：邊緣化開變柔光 */
    mix-blend-mode: screen;            /* 濾色：只會讓畫面變亮，像光 */
    animation: raySway 14s ease-in-out infinite;
  }
  /* 每道光的位置、寬度、節奏都不同，看起來比較自然 */
  /* 週期取互相不成倍數的秒數＋起點大幅錯開，避免幾道光同時亮同時暗 */
  .lightray:nth-child(1) { left: 120px; width: 80px;  animation-delay: -2s;    animation-duration: 11s; }
  .lightray:nth-child(2) { left: 300px; width: 140px; animation-delay: -11.5s; animation-duration: 17s; }
  .lightray:nth-child(3) { left: 520px; width: 65px;  animation-delay: -6.3s;  animation-duration: 13s; }
  .lightray:nth-child(4) { left: 680px; width: 120px; animation-delay: -16.8s; animation-duration: 21s; }
  .lightray:nth-child(5) { left: 880px; width: 90px;  animation-delay: -9.1s;  animation-duration: 25s; }
  /* 忽明忽暗 ＋ 緩緩左右飄移（角度也微微擺動，像水波折射） */
  @keyframes raySway {
    0%, 100% { opacity: 0; transform: translateX(-35px) skewX(-14deg); }
    50%      { opacity: 0.95; transform: translateX(35px)  skewX(-10deg); }
  }

  /* ===== 潛水艇 ===== */
  #sub {
    position: absolute;
    width: 691px;              /* 素材原始尺寸 */
    left: 194px; top: 390px;   /* 起始：浮在海面上（水平置中） */
    transition: filter 0.3s;
  }
  /* 漂浮時的上下晃動（只在水面待機時開啟） */
  #sub.bobbing { animation: bob 3s ease-in-out infinite; }
  @keyframes bob {
    0%, 100% { margin-top: 0; }
    50%      { margin-top: 14px; }
  }
  /* 下潛姿態：機頭朝左下傾斜，移到畫面偏右上 */
  #sub {
    z-index: 3;                 /* 在深度濾鏡之上，不被壓黑 */
    transition: left 1s ease-in-out, top 1s ease-in-out, transform 1s ease-in-out,
                width 1s ease-in-out, filter 0.3s, opacity 0.5s;
  }
  #seaFront { z-index: 4; }     /* 水面前層仍要蓋住潛水艇，維持泡在水裡的感覺 */
  #beam, #beamGlow { z-index: 3; }   /* 探照燈也不被壓黑 */
  #fxLayer { z-index: 5; }      /* 爆炸特效在最上層 */
  #sub.diving {
    left: 394px; top: 27px;
    transform: rotate(-25deg);
    animation: diveWobble 3s ease-in-out infinite;
    transform-origin: 52% 48%;
  }
  @keyframes diveWobble {
    0%, 100% { transform: rotate(-25deg) translateY(0); }
    25%      { transform: rotate(-25.8deg) translateY(6px); }
    50%      { transform: rotate(-24.5deg) translateY(-4px); }
    75%      { transform: rotate(-25.6deg) translateY(5px); }
  }
  /* 失敗時的劇烈搖晃（搖晃只在下潛中發生，所以以 -25 度為基準） */
  #sub.shake { animation: shake 0.5s linear; }
  @keyframes shake {
    0%,100% { transform: translateX(0) rotate(-25deg); }
    20% { transform: translateX(-18px) rotate(-29deg); }
    40% { transform: translateX(16px)  rotate(-22deg); }
    60% { transform: translateX(-14px) rotate(-28deg); }
    80% { transform: translateX(10px)  rotate(-18deg); }
  }

  /* ===== 探照燈光束：右端錨在機頭車頭燈(約 529,469)，角度由 JS 對準寶箱 ===== */
  #beam {
    position: absolute;
    left: -51px; top: 209px;       /* 右端中心 = (529, 459) */
    width: 580px; height: 500px;   /* 短一點（照到寶箱即可）、粗一點 */
    transform-origin: 100% 50%;
    --beam-angle: -45deg;
    transform: rotate(var(--beam-angle));      /* 負角度＝遠端往下擺 */
    filter: blur(16px);             /* 外層只負責模糊＋濾色，模糊的是裁好的光錐 */
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 1s ease-in-out, left 1s ease-in-out, top 1s ease-in-out,
                width 1s ease-in-out, height 1s ease-in-out, filter 1s ease-in-out;
    pointer-events: none;
  }
  /* 內層負責漸層與三角形裁切，避免模糊讓整個矩形透出來 */
  #beam .cone {
    width: 100%; height: 100%;
    background: linear-gradient(to left,
      rgba(255,232,170,0.6),
      rgba(255,214,140,0.3) 45%,
      rgba(255,205,120,0) 88%);
    clip-path: polygon(100% 46%, 0 2%, 0 98%, 100% 54%);
  }
  #beam.show { opacity: 1; }
  #beam.show .cone {
    animation: beamPulse 3.5s ease-in-out 1s infinite;   /* 輕微呼吸閃爍（延遲1秒，先讓淡入跑完） */
  }
  #sub.diving ~ #beam.show {
    animation: beamWobble 3s ease-in-out infinite;
  }
  @keyframes beamPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.78; }
  }
  @keyframes beamWobble {
    0%, 100% { transform: rotate(var(--beam-angle)) translateY(0); }
    25%      { transform: rotate(calc(var(--beam-angle) - 0.8deg)) translateY(6px); }
    50%      { transform: rotate(calc(var(--beam-angle) + 0.5deg)) translateY(-4px); }
    75%      { transform: rotate(calc(var(--beam-angle) - 0.6deg)) translateY(5px); }
  }

  /* 燈口光暈：貼在車頭燈位置 (529, 469)，柔和的圓形亮光 */
  #beamGlow {
    position: absolute;
    left: 449px; top: 379px;       /* 中心對準 (529, 459) */
    width: 160px; height: 160px;
    background: radial-gradient(circle,
      rgba(255,244,210,0.95),
      rgba(255,222,150,0.4) 45%,
      rgba(255,215,140,0) 70%);
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 1s ease-in-out, left 1s ease-in-out, top 1s ease-in-out,
                width 1s ease-in-out, height 1s ease-in-out;
    pointer-events: none;
  }
  #beamGlow.show { opacity: 1; }
  #sub.diving ~ #beamGlow.show {
    animation: beamGlowWobble 3s ease-in-out infinite;
  }
  @keyframes beamGlowWobble {
    0%, 100% { transform: translateY(0); }
    25%      { transform: translateY(6px); }
    50%      { transform: translateY(-4px); }
    75%      { transform: translateY(5px); }
  }

  /* ===== 礁石（左側，每段 2880px，每次下潛往上捲一段形成循環） ===== */
  #reefStrip {
    position: absolute;
    left: -60px; top: 1920px;  /* 永遠凸出畫面左緣 60px；水面待機時藏在畫面下方 */
    width: 409px;
    pointer-events: none;
  }
  .reefBlock {
    position: relative;
    width: 409px; height: 2880px;
  }
  .reefBlock .reefImg {
    display: block;
    width: 409px;
    height: 2880px;            /* 測試版：把 1920 高礁岩拉成 2880，讓每段容器不留空白 */
    transform: translateY(-100px);
  }
  /* 寶箱獨立軌道：跟礁岩同步移動，但層級在深度濾鏡之上（不被壓黑） */
  #chestStrip {
    position: absolute;
    left: -60px; top: 1920px;  /* 跟礁岩一樣永遠左凸 60px */
    width: 409px; height: 31680px;
    pointer-events: none;
    z-index: 3;
  }
  #chestStrip .chest {
    position: absolute;
    animation: chestGlow 2.2s ease-in-out infinite;   /* 金色光暈呼吸發亮 */
    left: 222px;               /* 平台中心置中（軌道左移 60，這裡 +60 補回，畫面位置不變） */
    transform: translateX(-50%);
    width: auto;               /* 使用 Treasure01～09 各自的原始尺寸 */
    height: auto;
  }
  /* 寶箱發亮：圖片本身變亮＋金色光暈，由弱到強來回呼吸 */
  @keyframes chestGlow {
    0%, 100% { filter: brightness(1) saturate(1)
                       drop-shadow(0 0 10px rgba(255, 216, 120, 0.45))
                       drop-shadow(0 0 24px rgba(255, 190, 80, 0.25)); }
    50%      { filter: brightness(1.35) saturate(1.15)
                       drop-shadow(0 0 18px rgba(255, 226, 140, 0.95))
                       drop-shadow(0 0 46px rgba(255, 200, 90, 0.55)); }
  }

  /* ===== 深度濾鏡：越潛越深，畫面蓋上越濃的深藍黑（色彩增值） ===== */
  #depthTint {
    position: absolute; left: 0; top: 0;
    width: 1080px; height: 1920px;
    background: #061228;
    mix-blend-mode: multiply;
    opacity: 0;
    z-index: 1;                /* 壓黑背景；鐵達尼號、潛水艇、寶箱與探照燈維持在上方 */
    pointer-events: none;
  }

  /* ===== 爆炸特效層（蓋在場景上、按鈕之下） ===== */
  #fxLayer {
    position: absolute; left: 0; top: 0;
    width: 1080px; height: 1920px;
    overflow: hidden;
    pointer-events: none;
  }
  .boomFlash {
    position: absolute;
    width: 1350px; height: 1350px;
    margin: -675px 0 0 -675px;    /* 讓 left/top 指向圓心 */
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255,255,255,1),
      rgba(255,240,180,0.95) 22%,
      rgba(255,190,90,0.9) 40%,
      rgba(255,120,40,0.6) 58%,
      rgba(255,90,30,0) 75%);
    mix-blend-mode: screen;
    transform: scale(0.12);
    opacity: 1;
    transition: transform 0.75s ease-out, opacity 0.95s ease-out;
  }
  /* 全畫面白閃：爆炸瞬間整個畫面亮一下 */
  .boomWhite {
    position: absolute; left: 0; top: 0;
    width: 1080px; height: 1920px;
    z-index: 89;                  /* 掛在 stage 上：蓋住整個場景，但不壓過 UI */
    background: #fff;
    opacity: 0.65;
    transition: opacity 0.45s ease-out;
    pointer-events: none;
  }
  .boomScreenFlash {
    position: absolute; left: 0; top: 0;
    width: 1080px; height: 1920px;
    z-index: 89;                  /* 全舞台爆炸光，不受 world zoomout 縮放 */
    background: radial-gradient(circle at 50% 44%,
      rgba(255,255,255,0.95),
      rgba(255,235,165,0.78) 22%,
      rgba(255,150,70,0.45) 48%,
      rgba(255,120,40,0) 78%);
    mix-blend-mode: screen;
    opacity: 0.9;
    transform: scale(0.96);
    transition: transform 0.8s ease-out, opacity 0.95s ease-out;
    pointer-events: none;
  }
  .boomRing {
    position: absolute;
    width: 260px; height: 260px;
    margin: -130px 0 0 -130px;
    border-radius: 50%;
    border: 22px solid rgba(255,235,160,0.95);
    box-shadow:
      0 0 40px rgba(255,230,120,0.95),
      inset 0 0 28px rgba(255,255,255,0.9);
    mix-blend-mode: screen;
    transform: scale(0.2);
    opacity: 1;
    transition: transform 0.8s ease-out, opacity 0.9s ease-out;
  }
  .boomP {
    position: absolute;
    border-radius: 50%;
    transition: transform 0.85s ease-out, opacity 0.85s ease-out;
  }
  /* 爆炸時整個舞台震動（用 margin 位移，不動到縮放用的 transform） */
  #stage.shaking { animation: stageShake 0.8s linear; }
  @keyframes stageShake {
    0%, 100% { margin-left: 0;     margin-top: 0; }
    8%  { margin-left: -34px; margin-top: 22px; }
    17% { margin-left: 31px;  margin-top: -19px; }
    27% { margin-left: -26px; margin-top: -16px; }
    40% { margin-left: 24px;  margin-top: 17px; }
    55% { margin-left: -18px; margin-top: -12px; }
    70% { margin-left: 12px;  margin-top: 9px; }
    86% { margin-left: -7px;  margin-top: -5px; }
  }
  #fishLayer, #bubbleLayer {
    position: absolute; left: 0; top: 0;
    width: 1080px; height: 1920px;
    overflow: hidden;
    pointer-events: none;
  }
  .fish { position: absolute; }
  .bubble { position: absolute; }

  /* ===== 測試用按鈕（右上角） ===== */
  #btnTest, #btnTestFail {
    position: absolute;
    right: 20px; top: 30px;
    z-index: 100;
    background: rgba(180, 40, 40, 0.85);
    border: 2px solid #ff9a9a;
    border-radius: 12px;
    color: #fff;
    font-size: 28px; font-weight: bold;
    padding: 10px 20px;
    cursor: pointer;
  }
  #btnTestFail { top: 110px; background: rgba(90, 40, 160, 0.85); border-color: #c9a0ff; }
  #btnTest:active, #btnTestFail:active { filter: brightness(1.3); }

  /* ===== 左上角：玩家資訊與餘額 ===== */
  #topBar {
    position: absolute; left: 20px; top: 25px;
    z-index: 90;
    background: rgba(10, 25, 50, 0.75);
    border-radius: 14px;
    padding: 12px 26px;
    color: #fff;
  }
  #topBar .name { font-size: 26px; opacity: 0.8; }
  #topBar .money { font-size: 34px; font-weight: bold; margin-top: 2px; }

  /* ===== 獎金表（10 層） ===== */
  #prizePanel {
    position: absolute;
    left: 16px; top: 1001px;
    width: 1048px; height: 550px;  /* 跟 image/UI-box.png 原始尺寸一致，避免拉伸變形 */
    z-index: 90;
    pointer-events: none;
  }
  #ladder {
    position: absolute;
    left: 58px; top: 1140px;
    width: 964px; height: 270px;
    z-index: 91;
    display: flex; flex-wrap: wrap;
    gap: 16px 30px;
    justify-content: center;      /* 置中排列：短金額一行三個、長金額自動變兩個 */
    align-content: center;
    background: transparent;
    border: 0;
    padding: 22px 30px;
  }
  .rung {
    font-size: 40px;
    font-weight: bold;
    color: #dfe7f2;               /* 金額：亮銀白 */
    text-shadow: 0 2px 4px rgba(0,0,30,0.4);
    padding: 4px 10px;
    border-radius: 30px;
    white-space: nowrap;
  }
  .rung .lv { color: #ffb640; margin-right: 10px; }   /* +N：金橘色 */
  /* 已通過的層數：純白 */
  .rung { transition: opacity 0.5s ease; }   /* 透明度變化平滑過渡 */
  .rung.passed { color: #fff; opacity: 0.1; }      /* 已通過：10% */
  .rung.passed .lv { color: #ffd94d; }
  .rung.future { opacity: 0.5; }                   /* 下潛中、還沒到的層：50%（水面時全部 100%） */
  .rung.current { opacity: 1; }                    /* 目前所在層：100% */
  /* 目前所在層：金色膠囊highlight */
  .rung.current {
    background: linear-gradient(180deg, #2b3b66, #16224a);
    outline: 3px solid #ffcf3f;
    color: #ffd94d;
  }
  .rung.current .lv { color: #fff; }

  /* ===== 目前累積獎金（金色膠囊） ===== */
  #winPill {
    position: absolute;
    left: 50%; top: 1443px;
    z-index: 91;
    transform: translateX(-50%);
    min-width: 610px;
    background: transparent;
    border: 0;
    padding: 10px 50px;
    text-align: center;
    font-size: 52px;
    font-weight: bold;
    color: #ffd94d;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    white-space: nowrap;
  }
  #winPill .coin {
    display: inline-block;
    width: 48px; height: 48px;
    background: radial-gradient(circle at 35% 35%, #ffe98a, #f5b71d 60%, #b97c00);
    border-radius: 50%;
    vertical-align: -6px;
    margin-right: 16px;
  }

<body>

<script>
/* =====================================================================
   ★★★ 可調整區：規則數字都集中在這裡，之後改規則只要動這一段 ★★★
   ===================================================================== */
var CONFIG = {
  startBalance: 1000000,          // 開始時的虛擬金幣
  betOptions: [100, 500, 1000, 5000, 10000],  // BET 按鈕循環切換的下注金額
  maxLevel: 10,                   // 最深 10 層

  // 每一層的「倍率」：累積獎金 = 下注金額 × 該層倍率
  multipliers: [1.2, 1.5, 2.0, 2.8, 4.0, 5.5, 7.5, 10, 15, 24],

  // 每一層下潛的「成功機率」（0~1）。越深越危險。
  successChance: [0.92, 0.88, 0.84, 0.80, 0.75, 0.70, 0.65, 0.60, 0.55, 0.50],

  diveTime: 1800,                 // 每層下潛動畫時間（毫秒）；TURBO 時減半
  surfaceY: 390,                  // 潛水艇在水面時的 top 座標
  bottomY: 1330                   // 潛到第 10 層時的 top 座標
};

/* ===== 遊戲狀態 ===== */
var G = {
  balance: CONFIG.startBalance,
  betIndex: 2,        // 目前選第幾個下注金額（預設 1000）
  level: 0,           // 目前在第幾層（0 = 還在水面）
  inRound: false,     // 是否在一局進行中
  busy: false,        // 動畫進行中，鎖住按鈕
  turbo: false,
  auto: false,
  win: 0              // 目前累積獎金
};

/* ===== 音效：瀏覽器第一次點擊後才會開始播放 ===== */
var SOUND_KEY = 'submarineTreasureSound';
var soundOn = localStorage.getItem(SOUND_KEY) !== 'off';
var audioUnlocked = false;
var audioCtx = null;
var sounds = {
  music: new Audio('music/aurosonmusic-tropical-summer-555960.mp3'),
  surface: new Audio('music/ocean-waves.mp3'),
  deep: new Audio('music/water-noises.mp3'),
  dive: new Audio('music/dive.mp3'),
  explosion: new Audio('music/explosion.mp3'),
  bonus: new Audio('music/cartoon-music-game-sfx-video-game-bonus.mp3'),
  titanic: new Audio('music/鐵達尼號.mp3'),
  titanicIntro: new Audio('music/titanic (mp3cut.net).mp3'),
  findShip: new Audio('music/找到船.mp3'),
  heartbeat: new Audio('music/heartbeat-01.mp3'),
  seagull1: new Audio('music/sound_garage-seagulls01.mp3'),
  seagull2: new Audio('music/sound_garage-seagulls02.mp3')
};
sounds.explosion.volume = 0.7;
sounds.bonus.volume = 0.6;
sounds.titanic.volume = 0.8;
sounds.titanicIntro.volume = 0;
sounds.findShip.volume = 0.8;
sounds.heartbeat.volume = 0;
sounds.seagull1.volume = 0.275;
sounds.seagull2.volume = 0.275;
sounds.music.loop = true;
sounds.surface.loop = true;
sounds.deep.loop = true;
sounds.heartbeat.loop = true;
sounds.music.volume = 0.15;
sounds.surface.volume = 0.495;
sounds.deep.volume = 0;
sounds.dive.volume = 0.6;

/* 音訊引擎只供提示音使用；背景音樂直接播放，確保本機開啟也有聲音。 */
function initAudioGraph(){
  if (audioCtx) return;
  try {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    audioCtx = new Ctx();
  } catch (e) {
    audioCtx = null;
  }
}

/* =====================================================================
   水下悶聲濾鏡（低通濾波器）
   ---------------------------------------------------------------------
   原理：水會吸掉聲音的高頻，只剩低頻 → 用「低通濾波器」把音樂的高音
   削掉，就會有頭沉進水裡的悶悶感，而且潛得越深越悶。
   限制：直接雙擊開啟（file://）時，瀏覽器安全規定會讓接上濾波器的
   音樂變成無聲，所以本機改用備援方案（音樂壓小聲＋深水環境音）；
   放上 Netlify / itch.io 後就是真正的濾波效果。
   ===================================================================== */
var muffleReady = false;   // 真濾波器是否已接上
var musicFilter = null;
var musicFilter2 = null;
var titanicIntroFadeTimer = null;
var titanicIntroFadeOutTimer = null;

function setupMuffle(){
  if (muffleReady) return;
  if (location.protocol === 'file:') return;   // 本機雙擊開啟 → 用備援方案
  initAudioGraph();
  if (!audioCtx) return;
  try {
    // 把音樂的輸出改道：音樂 → 濾波器A → 濾波器B → 喇叭
    // 串兩層低通濾波器，高音削得更乾淨，悶的感覺更明顯
    var src = audioCtx.createMediaElementSource(sounds.music);
    musicFilter = audioCtx.createBiquadFilter();
    musicFilter.type = 'lowpass';
    musicFilter.frequency.value = 20000;   // 20000Hz = 幾乎不過濾（水面）
    musicFilter2 = audioCtx.createBiquadFilter();
    musicFilter2.type = 'lowpass';
    musicFilter2.frequency.value = 20000;
    src.connect(musicFilter);
    musicFilter.connect(musicFilter2);
    musicFilter2.connect(audioCtx.destination);
    muffleReady = true;
  } catch (e) {}
}

/* 依層數調整悶的程度：0 = 水面（清晰），10 = 最深（最悶） */
function setUnderwaterDepth(level){
  if (muffleReady){
    // 真濾波：截止頻率隨深度下降（第1層約700Hz → 第10層約220Hz）
    var freq = level <= 0 ? 20000 : Math.max(220, 750 - level * 55);
    // setTargetAtTime = 平滑漸變，0.35 是漸變速度，不會突然跳一下
    musicFilter.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.35);
    musicFilter2.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.35);
    sounds.music.volume = level <= 0 ? 0.15 : 0.11;
  } else {
    // 備援（本機 file://）：音樂壓小聲，靠深水環境音營造悶感
    sounds.music.volume = level <= 0 ? 0.15 : 0.06;
  }
}

function setMusicMuffle(underwater){
  setUnderwaterDepth(underwater ? Math.max(G.level, 1) : 0);
}

function safePlay(audio){
  if (!soundOn || !audioUnlocked) return;
  function playNow(){
    var promise = audio.play();
    if (promise) promise.catch(function(){});
  }
  if (audioCtx && audioCtx.state === 'suspended'){
    audioCtx.resume().then(playNow).catch(playNow);
  } else {
    playNow();
  }
}
function unlockAudio(){
  audioUnlocked = true;
  initAudioGraph();
  setupMuffle();   // 放上網的版本：把音樂接上水下濾波器
  if (audioCtx && audioCtx.state === 'suspended'){
    audioCtx.resume().then(function(){
      safePlay(sounds.music);
      safePlay(sounds.surface);
      safePlay(sounds.deep);
    }).catch(function(){});
  } else {
    safePlay(sounds.music);
    safePlay(sounds.surface);
    safePlay(sounds.deep);
  }
}
function updateSoundLabel(){
  $('menuSound').textContent = soundOn ? '🔊 音效：開' : '🔇 音效：關';
}
function setSound(on){
  soundOn = on;
  localStorage.setItem(SOUND_KEY, on ? 'on' : 'off');
  updateSoundLabel();
  if (on){
    unlockAudio();
    updateAmbience(G.level > 0);
  } else {
    clearInterval(titanicIntroFadeTimer);
    clearTimeout(titanicIntroFadeOutTimer);
    Object.keys(sounds).forEach(function(key){ sounds[key].pause(); });
  }
}
function updateAmbience(underwater){
  if (!soundOn || !audioUnlocked) return;
  setMusicMuffle(underwater);
  safePlay(sounds.music);
  safePlay(sounds.surface);
  safePlay(sounds.deep);
  sounds.surface.volume = underwater ? 0.09 : 0.495;
  sounds.deep.volume = underwater ? 0.42 : 0;
  if (underwater) stopSeagulls();
  updateHeartbeat(G.level);
}

/* ===== 海鷗：只在潛水艇停留水面時，以隨機間隔播放兩種叫聲 ===== */
var seagullTimer = null;
function stopSeagulls(){
  [sounds.seagull1, sounds.seagull2].forEach(function(audio){
    audio.pause();
    audio.currentTime = 0;
  });
}
function scheduleSeagull(){
  clearTimeout(seagullTimer);
  var delay = 8000 + Math.random() * 12000;
  seagullTimer = setTimeout(function(){
    if (soundOn && audioUnlocked && !G.inRound && !G.busy && G.level === 0){
      var gull = Math.random() < 0.5 ? sounds.seagull1 : sounds.seagull2;
      gull.currentTime = 0;
      safePlay(gull);
    }
    scheduleSeagull();
  }, delay);
}
function playDiveSound(){
  if (!soundOn || !audioUnlocked) return;
  sounds.dive.currentTime = 0;
  safePlay(sounds.dive);
}
function heartbeatVolumeForLevel(level){
  if (level < 4 || level > 9) return 0;
  return 0.25 + (level - 4) * 0.14;   // 第4階小聲，第9階最大約 0.95
}
function heartbeatRateForLevel(level){
  if (level < 4 || level > 9) return 1;
  return 1 + (level - 4) * 0.09;   // 第4階原速，第9階約 1.45 倍速
}
function updateHeartbeat(level){
  var hb = sounds.heartbeat;
  if (!hb) return;
  var vol = heartbeatVolumeForLevel(level);
  if (!soundOn || !audioUnlocked || vol <= 0){
    hb.pause();
    hb.currentTime = 0;
    hb.volume = 0;
    return;
  }
  hb.volume = vol;
  hb.playbackRate = heartbeatRateForLevel(level);
  safePlay(hb);
}
function stopHeartbeat(){
  var hb = sounds.heartbeat;
  if (!hb) return;
  hb.pause();
  hb.currentTime = 0;
  hb.volume = 0;
  hb.playbackRate = 1;
}
function playTone(frequency, duration, type){
  if (!soundOn || !audioUnlocked) return;
  try {
    initAudioGraph();
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = frequency;
    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  } catch (e) {}
}

function playCountUpTick(progress){
  if (!soundOn || !audioUnlocked) return;
  try {
    initAudioGraph();
    if (!audioCtx) return;
    var now = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    var freq = 520 + progress * 880;   // 分數越接近目標，音高越亮
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, now);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.08, now + 0.035);
    gain.gain.setValueAtTime(0.001, now);
    gain.gain.exponentialRampToValueAtTime(0.045, now + 0.006);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.045);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.05);
  } catch (e) {}
}

function playButtonSound(kind){
  if (!soundOn || !audioUnlocked) return;
  try {
    initAudioGraph();
    if (!audioCtx) return;
    var now = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    var base = 720;
    if (kind === 'spin') base = 520;
    else if (kind === 'cash') base = 980;
    else if (kind === 'toggle') base = 640;
    else if (kind === 'menu') base = 780;

    osc.type = kind === 'spin' ? 'sawtooth' : 'square';
    osc.frequency.setValueAtTime(base, now);
    osc.frequency.exponentialRampToValueAtTime(base * 1.45, now + 0.035);
    gain.gain.setValueAtTime(0.001, now);
    gain.gain.exponentialRampToValueAtTime(0.055, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.065);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.075);
  } catch (e) {}
}

/* ===== 建立／更新獎金表 ===== */
function buildLadder(){
  var bet = CONFIG.betOptions[G.betIndex];
  var html = '';
  for (var i = 0; i < CONFIG.maxLevel; i++){
    var cls = 'rung';
    // 透明度規則：水面時全部 100%；下潛後 → 已通過 20%、目前所在層 100%、還沒到的 60%
    if (G.level === i + 1) cls += ' current';
    else if (G.level > i + 1) cls += ' passed';
    else if (G.level > 0) cls += ' future';
    html += '<div class="' + cls + '"><span class="lv">+' + (i+1) + '</span>' +
            fmt(bet * CONFIG.multipliers[i]) + '</div>';
  }
  $('ladder').innerHTML = html;
}

var WIN_BOX_DURATION = 5200;   // WIN 得分框＋壓黑層的顯示時間（需和 CSS 動畫秒數同步）
var winAmountAnimId = 0;
function animateWinAmount(target){
  winAmountAnimId++;
  var animId = winAmountAnimId;
  var el = $('winBoxAmount');
  var start = Math.min(1, target);
  var duration = Math.min(2200, Math.max(900, WIN_BOX_DURATION - 700));
  var t0 = performance.now();
  var lastTick = 0;

  // 依「最終金額」的長度決定字級：基準 138px（原92的1.5倍），塞不下就等比例縮小
  // （用最終金額量，跳數過程中字級才不會一直變動）
  el.style.fontSize = '138px';
  el.textContent = fmt(target);
  if (el.scrollWidth > el.clientWidth){
    el.style.fontSize = Math.max(56, Math.floor(138 * el.clientWidth / el.scrollWidth)) + 'px';
  }

  el.textContent = fmt(start);

  function step(now){
    if (animId !== winAmountAnimId) return;
    var p = Math.min(1, (now - t0) / duration);
    var eased = 1 - Math.pow(1 - p, 3);   // 前段快速衝、後段慢慢停住
    var value = start + (target - start) * eased;
    el.textContent = fmt(p >= 1 ? target : value);
    if (p < 1 && now - lastTick > 55){
      playCountUpTick(p);
      lastTick = now;
    }
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function showWinBox(amount, playTitanic){
  if (playTitanic) playTitanicSound();
  animateWinAmount(amount);
  var dimmer = $('winDimmer');
  var box = $('winBox');
  var glow = $('winGlow');
  dimmer.classList.remove('show');
  box.classList.remove('show');
  glow.classList.remove('show');
  void dimmer.offsetWidth;   // 重新觸發壓黑動畫
  void box.offsetWidth;   // 重新觸發得分彈窗動畫
  void glow.offsetWidth;
  dimmer.classList.add('show');
  box.classList.add('show');
  glow.classList.add('show');
  spawnWinCoins();           // 從得分框後面噴出金幣
}

/* =====================================================================
   得分金幣雨：從得分框後面往上噴出，再受重力落下（拋物線）
   金幣素材 coin01~05 是不同轉角的幀，隨機取用＋輪播就有旋轉感
   ===================================================================== */
function spawnWinCoins(){
  var layer = $('coinLayer');
  var coins = [];
  var cx = 540, cy = 900;   // 噴出點：得分框中心偏上
  for (var i = 0; i < 30; i++){
    var el = document.createElement('img');
    var frame = 1 + Math.floor(Math.random() * 5);
    el.src = 'image/coin0' + frame + '.png';
    var scale = 0.7 + Math.random() * 0.8;
    el.style.width = (64 * scale) + 'px';
    layer.appendChild(el);
    coins.push({
      el: el,
      frame: frame,
      x: cx + (Math.random() * 240 - 120),   // 從框後方一小段範圍噴出
      y: cy + (Math.random() * 80 - 40),
      vx: (Math.random() - 0.5) * 26,        // 左右噴的初速
      vy: -(16 + Math.random() * 20),        // 往上噴的初速
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 14,        // 旋轉速度
      flip: 6 + Math.floor(Math.random() * 8),   // 每幾幀換一張金幣圖（翻轉感）
      life: 0
    });
  }
  var last = performance.now();
  function fly(now){
    var f = Math.min((now - last) / (1000 / 60), 3);   // 幀率校正
    last = now;
    var alive = false;
    for (var j = 0; j < coins.length; j++){
      var c = coins[j];
      if (!c.el) continue;
      c.life += f;
      c.x += c.vx * f;
      c.y += c.vy * f;
      c.vy += 0.9 * f;                        // 重力
      c.rot += c.vr * f;
      if (c.life > c.flip){                   // 輪播金幣幀：旋轉翻面的感覺
        c.life = 0;
        c.frame = c.frame % 5 + 1;
        c.el.src = 'image/coin0' + c.frame + '.png';
      }
      c.el.style.left = c.x + 'px';
      c.el.style.top = c.y + 'px';
      c.el.style.transform = 'rotate(' + c.rot + 'deg)';
      if (c.y > 2000){ c.el.remove(); c.el = null; }   // 掉出畫面就清掉
      else alive = true;
    }
    if (alive) requestAnimationFrame(fly);
    else layer.innerHTML = '';
  }
  requestAnimationFrame(fly);
}

      audio.pause();
      audio.volume = 0;

/* =====================================================================
   潛水艇移動：從目前位置滑到某一層的深度
   ===================================================================== */
function levelToY(level){
  if (level <= 0) return CONFIG.surfaceY;
  var step = (CONFIG.bottomY - 760) / (CONFIG.maxLevel - 1);
  return 760 + step * (level - 1);
}
function moveSubTo(level, ms, done){
  // 潛水艇不逐層移動，靠場景捲動營造下潛感；
  // 下潛時切換成傾斜姿態＋打開探照燈，回水面時恢復漂浮
  if (level <= 0){
    sub.classList.add('bobbing');
    sub.classList.remove('diving');
    sub.classList.remove('finalShrink');   // 回水面：恢復原本大小
    $('beam').classList.remove('show');
    $('beamGlow').classList.remove('show');
  } else {
    sub.classList.remove('bobbing');
    sub.classList.add('diving');
    $('beam').classList.add('show');
    $('beamGlow').classList.add('show');
  }
  moveBgTo(level, ms);
  setTimeout(function(){
    if (done) done();
  }, ms + 60);
}

/* ===== 背景捲動：第一次下潛就直接捲到背景最底端，浮回水面時捲回頂端 ===== */
var BG_SCROLL = 3708 - 1920;   // 背景比舞台高出的部分（可捲動的距離）
var lastBgOff = 0;             // 上一次背景的捲動位置（用來算魚和泡泡要跟著移多少）
function moveBgTo(level, ms){
  var off = (level <= 0 ? 0 : -BG_SCROLL);   // 場景整體往上捲的距離
  // 魚和泡泡跟著場景一起被捲動（第一次下潛和浮回水面時）
  if (off !== lastBgOff){
    scrollAmbient(off - lastBgOff, ms);
    lastBgOff = off;
  }
  // 浮回水面：鐵達尼號沉回去、鏡頭恢復
  if (level <= 0) hideTitanic(ms);
  var bg = $('bg');
  bg.style.transition = 'top ' + ms + 'ms ease-in-out';
  bg.style.top = off + 'px';

  // 海面波浪跟著背景一起被捲出畫面上方（基準位置 630 / 680）
  var seaBack = $('seaBack'), seaFront = $('seaFront');
  seaBack.style.transition  = 'top ' + ms + 'ms ease-in-out';
  seaFront.style.transition = 'top ' + ms + 'ms ease-in-out';
  seaBack.style.top  = (630 + off) + 'px';
  seaFront.style.top = (680 + off) + 'px';

  // 陽光光束跟著海面一起捲動（基準位置 738）
  var rays = $('lightRays');
  rays.style.transition = 'top ' + ms + 'ms ease-in-out';
  rays.style.top = (738 + off) + 'px';

  // 礁岩＋寶箱軌道：下潛時整條往上抬，讓寶箱出現在畫面中上段
  var strips = [$('reefStrip'), $('chestStrip')];
  if (level <= 0){
    // 浮回水面：依照離開前的深度倒捲礁岩。
    // 例：從第3層回來，背景/海面回捲一段，礁岩再倒捲2段，視覺上就是3層距離。
    returnReefToSurface(pendingReturnDepth || 1, ms);
    pendingReturnDepth = 0;
  } else {
    if (!inFinalDive){   // 最終下潛的捲動由 finalDive 自己控制，這裡不要覆寫
      for (var i2 = 0; i2 < strips.length; i2++){
        strips[i2].style.transition = 'top ' + ms + 'ms ease-in-out, transform ' + ms + 'ms ease-in-out';
        strips[i2].style.top = '-20px';
      }
    }
    aimBeam(ms);   // 下潛時讓探照燈對準目前畫面上的寶箱
  }

  // 深度濾鏡：第 2 層開始，每潛一層濃度 +6%（第2層6%、第3層12%…）；回水面歸零
  var tint = $('depthTint');
  // transform 1.5s = 鏡頭拉遠的速度，讓反向縮放跟 world 同步抵銷
  tint.style.transition = 'opacity ' + ms + 'ms ease-in-out, transform 1.5s ease-in-out';
  tint.style.opacity = level <= 1 ? 0 : (level - 1) * 0.06;
}

/* ===== 探照燈對準寶箱：算出目前可見寶箱的實際舞台座標，旋轉光束指向它 =====
   機頭燈固定在 (529, 489)；寶箱中心 x 固定在 162，y 從目前可見寶箱 DOM 位置取得 */
function aimBeam(ms){
  var beam = $('beam');
  var glow = $('beamGlow');
  var chestStrip = $('chestStrip');
  var targetX = 162;
  var targetY = null;
  var chests = chestStrip ? chestStrip.querySelectorAll('.chest') : [];
  for (var k = 0; k < chests.length; k++){
    var chest = chests[k];
    var h = chest.offsetHeight || chest.naturalHeight || 160;
    var y = chestStrip.offsetTop + chest.offsetTop + h / 2 - chestOff;
    if (y > 180 && y < 1850){ targetY = y; break; }
  }
  var isFinalShrink = sub.classList.contains('finalShrink');
  var subScale = isFinalShrink ? (384 / 691) : 1;
  var beamX = isFinalShrink ? (547 + 135 * subScale) : 529;
  var beamY = (isFinalShrink ? (139 + 462 * subScale) : 489) - 30;   // 燈光整體上移 30px
  var beamW = Math.round(580 * (0.65 + subScale * 0.35));
  var beamH = Math.round(500 * (0.55 + subScale * 0.45));
  var glowSize = Math.round(160 * Math.max(0.58, subScale));
  beam.style.left = Math.round(beamX - beamW) + 'px';
  beam.style.top = Math.round(beamY - beamH / 2) + 'px';
  beam.style.width = beamW + 'px';
  beam.style.height = beamH + 'px';
  beam.style.filter = 'blur(' + Math.round(16 * (0.6 + subScale * 0.4)) + 'px)';
  if (glow){
    glow.style.left = Math.round(beamX - glowSize / 2) + 'px';
    glow.style.top = Math.round(beamY - glowSize / 2) + 'px';
    glow.style.width = glowSize + 'px';
    glow.style.height = glowSize + 'px';
  }
  var deg = targetY === null ? 45
          : Math.atan2(targetY - beamY, beamX - targetX) * 180 / Math.PI;
  beam.style.transition = 'opacity 1s ease-in-out, transform ' + ms + 'ms ease-in-out, '
                        + 'left ' + ms + 'ms ease-in-out, top ' + ms + 'ms ease-in-out, '
                        + 'width ' + ms + 'ms ease-in-out, height ' + ms + 'ms ease-in-out, '
                        + 'filter ' + ms + 'ms ease-in-out';
  if (glow){
    glow.style.transition = 'opacity 1s ease-in-out, left ' + ms + 'ms ease-in-out, '
                          + 'top ' + ms + 'ms ease-in-out, width ' + ms + 'ms ease-in-out, '
                          + 'height ' + ms + 'ms ease-in-out';
  }
  beam.style.setProperty('--beam-angle', '-' + deg + 'deg');
}

/* ===== 捲動循環：每次下潛捲一段（2880px）。
   礁岩與寶箱各疊 11 段，最多潛 10 層也捲不完，一輪之中完全不需要
   「瞬間歸位」——避免動畫沒跑完就被強制歸位造成的畫面跳動。
   位移只在浮回水面（礁岩已在畫面外）時歸零。 ===== */
var STEP = 2880;
var SCROLL_STEP = STEP;
var CHEST_TOP = Math.round(705 * 1.5) - 340;
var CHEST_CENTER_Y = Math.round(837 * 1.5);
var reefOff = 0;
var chestOff = 0;
var pendingReturnDepth = 0;   // 回海面時要依照離開前的深度倒捲幾層礁岩

// 開場時把 11 段礁岩和寶箱塞進軌道
(function buildStrips(){
  var reefHtml = '', chestHtml = '';
  for (var k = 0; k < 11; k++){
    reefHtml += '<div class="reefBlock"><img class="reefImg" src="image/reef.png" alt=""></div>';
    // 寶箱只放前 9 段（k=0~8）：第 9 層下潛（最終演出）經過的礁岩上不放寶箱
    if (k < 9){
      var treasureImg = 'Treasure' + String(k + 1).padStart(2, '0') + '.png';
      var chestTop = CHEST_TOP + k * STEP + (k < 4 ? 20 : 0) + (k === 8 ? -30 : 0);
      chestHtml += '<img class="chest" src="image/' + treasureImg + '" style="top:' + chestTop + 'px" alt="">';
    }
  }
  $('reefStrip').innerHTML = reefHtml;
  $('chestStrip').innerHTML = chestHtml;
})();

/* =====================================================================
   潛水艇序列動畫：輪播 submarine/ 資料夾裡的 7 張幀（螺旋槳轉動）
   ===================================================================== */
(function subAnimation(){
  var frames = [];
  for (var i = 1; i <= 6; i++){
    // 檔名規則：submarine_0001_06.png ~ submarine_0006_01.png（第 7 張已移除）
    var name = 'submarine/submarine_000' + i + '_0' + (7 - i) + '.png';
    var pre = new Image();
    pre.src = name;          // 先載入，切換時不會閃白
    frames.push(name);
  }
  var fi = 0;
  (function next(){
    fi = (fi + 1) % frames.length;
    sub.src = frames[fi];
    // 水面待機約每秒 9 幀；下潛時轉速快 1 倍（間隔減半）
    setTimeout(next, sub.classList.contains('diving') ? 35 : 110);
  })();
})();

/* =====================================================================
   螺旋槳泡泡：下潛時尾部的螺旋槳不斷冒出小泡泡，往後上方飄散
   ===================================================================== */
(function propBubbles(){
  setInterval(function(){
    if (!sub.classList.contains('diving')) return;
    // 螺旋槳位置：依潛水艇目前的位置/大小換算（傾斜 -25 度，尾巴翹向右上）
    var w = sub.offsetWidth;
    var cx = sub.offsetLeft + w / 2;
    var cy = sub.offsetTop + sub.offsetHeight / 2;
    var px = cx + w * 0.435 - 80;
    var py = cy - w * 0.20 + 80;
    var count = 1 + Math.floor(Math.random() * 2);   // 每次 1~2 顆
    for (var i = 0; i < count; i++){
      (function(){
        var img = document.createElement('img');
        img.src = 'image/Bubbles02.png';
        img.className = 'bubble';
        var s = 8 + Math.random() * 14;              // 小顆泡泡 8~22px
        img.style.width = s + 'px';
        img.style.left = (px + Math.random() * 40 - 20) + 'px';
        img.style.top  = (py + Math.random() * 40 - 20) + 'px';
        img.style.opacity = '0.9';
        img.style.zIndex = Math.random() < 0.5 ? '2' : '4';   // 一半在艇後、一半在艇前
        img.style.transition = 'transform 1s ease-out, opacity 1s ease-out';
        $('bubbleLayer').appendChild(img);
        setTimeout(function(){
          // 往後上方（右上）飄散
          img.style.transform = 'translate(' + (30 + Math.random() * 70) + 'px, -'
                                             + (60 + Math.random() * 90) + 'px) scale(1.5)';
          img.style.opacity = '0';
        }, 20);
        setTimeout(function(){ img.remove(); }, 1100);
      })();
    }
  }, 110);
})();

function scrollReef(ms){
  var reef = $('reefStrip'), chest = $('chestStrip');
  reefOff  += SCROLL_STEP;
  chestOff += SCROLL_STEP;
  scrollAmbient(-SCROLL_STEP, ms);   // 魚和泡泡跟著礁岩一起往上捲
  reef.style.transition  = 'transform ' + ms + 'ms ease-in-out';
  reef.style.transform   = 'translateY(-' + reefOff + 'px)';
  chest.style.transition = 'transform ' + ms + 'ms ease-in-out';
  chest.style.transform  = 'translateY(-' + chestOff + 'px)';
}

function returnReefToSurface(depth, ms){
  var reef = $('reefStrip'), chest = $('chestStrip');
  // 回海面不要用「層數」估算，直接用目前實際捲動量歸零。
  // 第 9→10 最終下潛會額外多捲 3 段；若只用層數回捲，礁岩會殘留在海面上再突然消失。
  var reefReturn = reefOff;
  var chestReturn = chestOff;

  inFinalDive = false;
  scrollAmbient(reefReturn, ms);   // 魚和泡泡也跟著上浮方向倒捲

  reef.style.opacity = '1';
  reef.style.transition = 'top ' + ms + 'ms ease-in-out, '
                        + 'transform ' + ms + 'ms cubic-bezier(0.18, 0.68, 0.22, 1)';
  reef.style.top = '1920px';   // 海面回來時，最後一段把礁岩帶回畫面下方
  reef.style.transform = 'translateY(0)';

  chest.style.opacity = '0';   // 回捲上浮時不顯示寶箱
  chest.style.transition = 'none';
  chest.style.top = '1920px';
  chest.style.transform = 'translateY(-' + Math.max(0, chestOff - chestReturn) + 'px)';

  setTimeout(function(){
    reefOff = 0;
    chestOff = 0;
    reef.style.transition = 'none';
    reef.style.top = '1920px';
    reef.style.transform = 'translateY(0)';
    reef.style.opacity = '1';
    chest.style.transition = 'none';
    chest.style.top = '1920px';
    chest.style.transform = 'translateY(0)';
    chest.style.opacity = '1';
    // 回捲結束、礁岩已在畫面外：解除「多凸 60px」狀態（此時 transition 是 none，無感切回）
    reef.classList.remove('deepLeft');
    chest.classList.remove('deepLeft');
  }, ms + 100);
}

/* =====================================================================
   最終下潛（9→10）：時間拉長 3 倍的三段式演出
   第 1 段：捲第 1 次礁岩（下潛音效在 doSpin 已播第 1 次）
   第 2 段：捲第 2 次礁岩＋播第 2 次下潛音效
   第 3 段：礁岩邊捲邊淡出消失＋播第 3 次下潛音效 → 鐵達尼號登場
   ===================================================================== */
var FINAL_PHASE_MULT = 1.9;   // 最終下潛每一段 = 一般下潛時間 × 這個倍數（調節奏改這裡）
var inFinalDive = false;      // 最終下潛中：不讓 moveBgTo 覆寫礁岩的捲動設定
function finalDive(ms){
  var p = ms * FINAL_PHASE_MULT;   // 每一段的長度（預設約 1.7 秒）
  var total = p * 3;               // 三段合起來一次捲完，中間不停頓
  inFinalDive = true;
  sub.classList.add('finalShrink');   // 按下 SPIN 就開始，用整段時間慢慢縮小
  aimBeam(total);                      // 潛水艇縮小時，探照燈與燈口光暈也一起縮小、貼回艇頭

  // 礁岩＋寶箱：一口氣連續捲 3 段的距離（起步快、後段滑行），
  // 淡出用「延遲 2p 開始」的過渡自動接上，不會中途重設動畫
  reefOff  += SCROLL_STEP * 3;
  chestOff += SCROLL_STEP * 3;
  scrollAmbient(-SCROLL_STEP * 3, total * 0.6, true);   // 魚和泡泡捲快一點；最終下潛不補新魚群
  var strips = [$('reefStrip'), $('chestStrip')];
  var offs = [reefOff, chestOff];
  for (var i = 0; i < strips.length; i++){
    strips[i].style.transition = 'transform ' + total + 'ms cubic-bezier(0.3, 0.55, 0.4, 1), '
                               + 'opacity ' + p + 'ms ease-in-out ' + (p * 2) + 'ms, '
                               + 'left 1.5s ease-in-out';
    strips[i].style.transform = 'translateY(-' + offs[i] + 'px)';
    strips[i].style.opacity = '0';   // 延遲 2p 後才開始淡出（第 3 段）
    strips[i].classList.add('deepLeft');   // 第 10 層演出～回捲期間多凸 60px
  }

  setTimeout(function(){   // 第 2 段：第 2 次下潛音效
    playDiveSound();
    spawnDiveBubbles();
  }, p);

  setTimeout(function(){   // 第 3 段：第 3 次下潛音效 → 鐵達尼號登場
    playDiveSound();
    spawnDiveBubbles();
    showTitanic(p);   // 鐵達尼號用 p×1.6 的時間緩緩升起，更有份量
  }, p * 2);
}

/* =====================================================================
   鐵達尼號（第 10 層大獎）：從畫面底部升起＋鏡頭拉遠
   ===================================================================== */
function showTitanic(ms){
  stopHeartbeat();   // 找到鐵達尼號時，深水心跳停止
  var t = $('titanic');
  t.style.transition = 'top ' + (ms * 1.6) + 'ms ease-in-out, transform ' + (ms * 1.6) + 'ms ease-in-out';
  t.style.top = '10px';                     // 升到定位：桅杆在畫面上段
  $('prizePanel').src = 'image/UI-box02.png';   // 找到鐵達尼號：換成慶祝版面板
  t.style.transform = 'scale(1.1112)';      // 130% → 100%（換算鏡頭縮小後剛好填滿畫面）
  $('world').classList.add('zoomout');      // 鏡頭拉遠
}
function hideTitanic(ms){
  var t = $('titanic');
  var fast = Math.max(450, Math.min(900, ms * 0.2));   // 回海面時快速收掉，避免和礁岩回捲不同步
  t.style.transition = 'top ' + fast + 'ms ease-in-out, transform ' + fast + 'ms ease-in-out';
  t.style.top = '2450px';                   // 沉回畫面底下（含 130% 縮放的餘裕）
  t.style.transform = 'scale(1.4445)';      // 恢復登場前的起始大小
  $('world').classList.remove('zoomout');   // 鏡頭恢復
  $('prizePanel').src = 'image/UI-box.png'; // 面板換回平常的版本
}

/* =====================================================================
   下潛泡泡：從潛水艇艇身冒出一群泡泡，往上飄散後消失
   ===================================================================== */
function spawnDiveBubbles(){
  var layer = $('bubbleLayer');
  var count = 24 + Math.floor(Math.random() * 9);   // 每次 24~32 顆
  for (var i = 0; i < count; i++){
    (function(){
      var img = document.createElement('img');
      img.src = 'image/' + (Math.random() < 0.5 ? 'Bubbles.png' : 'Bubbles02.png');
      img.className = 'bubble';
      // 沿著艇身隨機分佈（取潛水艇目前畫面上的位置）
      // 出現時擠在艇身中段一小塊（密集），飄的時候才往四周散開
      var x = sub.offsetLeft + sub.offsetWidth * (0.32 + Math.random() * 0.36);
      var y = sub.offsetTop + 160 + sub.offsetHeight * (0.30 + Math.random() * 0.35);
      // 大小差異大：偏小顆為主，偶爾出現大顆（8px ~ 70px）
      var s = 0.3 + Math.random() * Math.random() * 2.3;
      img.style.left = x + 'px';
      img.style.top = y + 'px';
      img.style.width = (27 * s) + 'px';
      img.style.opacity = '0.95';
      // 一半泡泡在潛水艇後面、一半在前面（潛水艇 z-index 是 2）
      img.style.zIndex = Math.random() < 0.5 ? '1' : '3';
      img.style.transition = 'transform 0.9s ease-out, opacity 0.9s ease-out';
      layer.appendChild(img);
      // 每顆錯開一點時間才起飛，比較像自然冒出來的
      setTimeout(function(){
        img.style.transform = 'translate(' + (Math.random() * 260 - 130) + 'px, -'
                                           + (200 + Math.random() * 220) + 'px)';
        img.style.opacity = '0';
      }, 10 + Math.random() * 180);
      setTimeout(function(){ img.remove(); }, 1300);
    })();
  }
}

/* =====================================================================
   SPIN：開始一局／往下潛一層
   ===================================================================== */
/* =====================================================================
   決策倒數：每層下潛成功後，8 秒內要選擇 CASH OUT／繼續，逾時自動下潛
   ===================================================================== */
var DECISION_SECONDS = 8;
var decisionTimer = null;
function startDecisionCountdown(){
  cancelDecisionCountdown();
  if (!G.inRound || G.busy || G.auto || G.level < 1 || G.level >= CONFIG.maxLevel) return;
  var remain = DECISION_SECONDS;
  var el = $('countdown');
  $('countdownNum').textContent = remain;
  el.classList.remove('urgent');
  el.classList.add('show');
  decisionTimer = setInterval(function(){
    remain--;
    if (remain <= 0){
      cancelDecisionCountdown();
      doSpin();   // 逾時：自動下潛
      return;
    }
    $('countdownNum').textContent = remain;
    el.classList.toggle('urgent', remain <= 3);
  }, 1000);
}
function cancelDecisionCountdown(){
  if (decisionTimer){ clearInterval(decisionTimer); decisionTimer = null; }
  $('countdown').classList.remove('show');
  $('countdown').classList.remove('urgent');
}

function doSpin(){
  if (G.busy) return;
  cancelDecisionCountdown();   // 玩家做出選擇（或自動下潛觸發）：停止倒數
  var bet = CONFIG.betOptions[G.betIndex];

  // 還沒開局：先扣下注金額
  if (!G.inRound){
    if (G.balance < bet){ showMessage('餘額不足', true); return; }
    G.balance -= bet;
    G.inRound = true;
    G.level = 0;
    G.win = 0;
  }

  if (G.level >= CONFIG.maxLevel) return;  // 已到底，只能收獎金

  G.busy = true;
  playDiveSound();
  spawnDiveBubbles();   // 艇身冒出一群泡泡
  updateAmbience(true);
  refresh();

  var ms = G.turbo ? CONFIG.diveTime / 2 : CONFIG.diveTime;
  var nextLevel = G.level + 1;
  var ok = Math.random() < CONFIG.successChance[nextLevel - 1];
  if (G.testForceWin){ ok = true; G.testForceWin = false; }    // 測試按鈕：下一潛必成功
  if (G.testForceLose){ ok = false; G.testForceLose = false; } // 測試按鈕：下一潛必失敗

  setUnderwaterDepth(nextLevel);   // 音樂跟著變悶

  // 9→10 的最終下潛：時間拉長 3 倍的特別演出
  var isFinal = nextLevel >= CONFIG.maxLevel;
  var totalMs = isFinal ? ms * FINAL_PHASE_MULT * 3 : ms;
  G.seedLevel = nextLevel;   // 預先生成的魚群用「即將抵達」層數的魚種組合

  if (isFinal){
    playTitanicIntroSound();
    if (!ok) scheduleTitanicIntroFailFadeOut();
    finalDive(ms);   // 三段式演出：捲兩次礁岩 → 礁岩淡出 → 鐵達尼號登場
  } else if (nextLevel >= 2){
    // 第一次下潛礁岩正在從畫面下方升上來，不捲動；第二層開始每按一次 SPIN 循環一張
    scrollReef(ms);
  }
  moveSubTo(nextLevel, totalMs, function(){
    if (ok){
      playTone(520 + nextLevel * 35, 0.18, 'sine');
      G.level = nextLevel;
      G.win = bet * CONFIG.multipliers[G.level - 1];
      updateHeartbeat(G.level);
      if (G.level >= CONFIG.maxLevel){
        // 潛到最深層：直接把獎金全收
        playFindShipSound();
        showMessage('抵達海底！');
        setTimeout(function(){ cashOut(1); }, 3500);   // 停 3.5 秒，讓玩家看見鐵達尼號後接得分動畫
      }
      G.busy = false;
      refresh();
      if (G.auto && G.level < CONFIG.maxLevel) setTimeout(doSpin, G.turbo ? 350 : 700);
      else startDecisionCountdown();   // 開始 8 秒決策倒數，逾時自動下潛
    } else {
      playTone(95, 0.65, 'sawtooth');
      // 失敗：搖晃 → 爆炸 → 獎金歸零、浮回水面
      sub.classList.add('shake');
      showMessage('潛航失敗…', true);
      setTimeout(function(){
        sub.classList.remove('shake');
        explodeSub();
        setTimeout(function(){ endRound(nextLevel); }, 900);
      }, 500);
    }
  });
}

/* =====================================================================
   潛航失敗：潛水艇爆炸（閃光＋火球粒子＋煙泡），本體消失後再浮回水面
   ===================================================================== */
function playExplosionSound(){
  if (!soundOn || !audioUnlocked) return;
  sounds.explosion.currentTime = 0;   // 每次都從頭播
  safePlay(sounds.explosion);
}

function explodeSub(){
  stopHeartbeat();
  playExplosionSound();
  // 潛水艇炸掉，頭燈的光束和光暈一起熄滅
  $('beam').classList.remove('show');
  $('beamGlow').classList.remove('show');
  var fx = $('fxLayer');
  // 爆炸中心 = 潛水艇目前的中心
  var cx = sub.offsetLeft + sub.offsetWidth / 2;
  var cy = sub.offsetTop + sub.offsetHeight / 2;

  // 0. 全畫面白閃＋舞台震動
  var stage = $('stage');
  var white = document.createElement('div');
  white.className = 'boomWhite';
  stage.appendChild(white);
  requestAnimationFrame(function(){ white.style.opacity = '0'; });
  setTimeout(function(){ white.remove(); }, 520);
  var screenFlash = document.createElement('div');
  screenFlash.className = 'boomScreenFlash';
  stage.appendChild(screenFlash);
  requestAnimationFrame(function(){
    screenFlash.style.transform = 'scale(1.08)';
    screenFlash.style.opacity = '0';
  });
  setTimeout(function(){ screenFlash.remove(); }, 1050);
  stage.classList.add('shaking');
  setTimeout(function(){ stage.classList.remove('shaking'); }, 850);

  // 1. 中心閃光火球
  var flash = document.createElement('div');
  flash.className = 'boomFlash';
  flash.style.left = cx + 'px';
  flash.style.top  = cy + 'px';
  fx.appendChild(flash);
  requestAnimationFrame(function(){
    flash.style.transform = 'scale(2.35)';
    flash.style.opacity = '0';
  });

  // 1.5 衝擊波光圈：爆炸中心往外擴散
  for (var r = 0; r < 2; r++){
    var ring = document.createElement('div');
    ring.className = 'boomRing';
    ring.style.left = cx + 'px';
    ring.style.top  = cy + 'px';
    ring.style.transitionDelay = (r * 0.08) + 's';
    fx.appendChild(ring);
    (function(el, idx){
      requestAnimationFrame(function(){
        el.style.transform = 'scale(' + (3.2 + idx * 1.15) + ')';
        el.style.opacity = '0';
      });
    })(ring, r);
  }

  // 2. 橘黃碎片粒子四散
  var colors = ['#ffffff', '#ffef9a', '#ffcf55', '#ff9b35', '#ff5a28', '#fff3c4'];
  for (var i = 0; i < 56; i++){
    var p = document.createElement('div');
    p.className = 'boomP';
    var size = 14 + Math.random() * 76;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = (cx - size / 2) + 'px';
    p.style.top  = (cy - size / 2) + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    fx.appendChild(p);
    (function(el){
      var ang = Math.random() * Math.PI * 2;
      var dist = 260 + Math.random() * 620;
      var spin = Math.random() * 720 - 360;
      requestAnimationFrame(function(){
        el.style.transform = 'translate(' + (Math.cos(ang) * dist) + 'px,'
                                          + (Math.sin(ang) * dist) + 'px) rotate(' + spin + 'deg) scale(0.15)';
        el.style.opacity = '0';
      });
    })(p);
  }

  // 3. 灰色煙泡往上飄
  for (var j = 0; j < 14; j++){
    var s = document.createElement('div');
    s.className = 'boomP';
    var ss = 42 + Math.random() * 95;
    s.style.width = ss + 'px';
    s.style.height = ss + 'px';
    s.style.left = (cx - ss / 2 + (Math.random() * 260 - 130)) + 'px';
    s.style.top  = (cy - ss / 2 + (Math.random() * 100 - 50)) + 'px';
    s.style.background = 'radial-gradient(circle, rgba(210,220,235,0.55), rgba(80,90,110,0.42) 58%, rgba(45,50,70,0) 72%)';
    fx.appendChild(s);
    (function(el){
      var drift = Math.random() * 360 - 180;
      requestAnimationFrame(function(){
        el.style.transform = 'translate(' + drift + 'px, -' + (240 + Math.random() * 260) + 'px) scale(2.2)';
        el.style.opacity = '0';
      });
    })(s);
  }

  // 潛水艇本體消失；1.4 秒後清掉特效
  sub.style.opacity = '0';
  setTimeout(function(){ fx.innerHTML = ''; }, 1400);
}

/* =====================================================================
   CASH OUT：portion = 1 全收、0.5 收一半
   ===================================================================== */
function cashOut(portion){
  if (G.busy && portion !== 1) return;
  if (!G.inRound || G.win <= 0) return;
  cancelDecisionCountdown();   // 玩家選擇收獎金：停止倒數

  var got = G.win * portion;
  var isTitanicWin = G.level >= CONFIG.maxLevel && (portion === 1 || G.win - got <= 0);
  var isFindShipWin = G.level >= 5 && G.level <= 9;
  playBonusSound();
  if (isFindShipWin) playFindShipSound();
  G.balance += got;
  G.win -= got;

  if (portion === 1 || G.win <= 0){
    $('treasure').classList.remove('show');
    void $('treasure').offsetWidth;
    $('treasure').classList.add('show');
    showWinBox(got, isTitanicWin);
    G.busy = true;   // WIN 播放期間先鎖住操作，等得分框結束才浮回水面
    refresh();
    setTimeout(function(){ endRound(); }, WIN_BOX_DURATION);
  } else {
    showWinBox(got, false);   // 收一半，繼續潛
    refresh();
    startDecisionCountdown(); // 收一半後重新計時：8 秒內要再決定
  }
}

function returnTimeFromDepth(level){
  var depth = Math.max(1, Math.min(CONFIG.maxLevel, level || 1));
  return 700 + depth * 400;   // 第1層約1.1秒；第10層約4.7秒，越深回海面越久
}

/* ===== 一局結束：潛水艇浮回水面 ===== */
function endRound(returnFromLevel){
  cancelDecisionCountdown();   // 保險：回水面時一定沒有倒數
  stopHeartbeat();
  G.seedLevel = 0;             // 回水面：魚種組合回到水面狀態
  var depth = returnFromLevel || G.level || 1;
  var returnMs = returnTimeFromDepth(depth);
  pendingReturnDepth = depth;
  G.busy = true;
  G.inRound = false;
  G.level = 0;
  G.win = 0;
  G.auto = false;
  $('btnAuto').classList.remove('on');
  playDiveSound();
  updateAmbience(false);
  refresh();

  moveSubTo(0, returnMs, function(){
    sub.style.transition = '';
    sub.style.opacity = '1';   // 爆炸後在水面重新出現（淡入）
    sub.classList.add('bobbing');
    G.busy = false;
    refresh();
  });
}

/* =====================================================================
   魚群與泡泡：用 requestAnimationFrame 加「幀率校正」，
   不管螢幕是 60Hz 還是 120Hz，游動速度都一樣。
   ===================================================================== */
var fishes = [];
var bubbles = [];
var lastTime = performance.now();

/* ===== 魚種表：每種魚只出現在指定的層數範圍（min~max 層）
   speed = [最慢, 最快]、scale = [最小, 最大]、weight = 抽中的權重
   jelly = true 代表水母：不左右翻轉、緩緩往上飄＋左右搖曳 ===== */
var FISH_TYPES = [
  { src: 'fishs01.png',     w: 71,  min: 0, max: 10, speed: [0.6, 1.8], scale: [0.6, 1.5], weight: 3 },
  { src: 'fishs02.png',     w: 71,  min: 0, max: 10, speed: [0.6, 1.8], scale: [0.6, 1.5], weight: 3 },
  { src: 'seaturtle.png',   w: 237, min: 3, max: 6,  speed: [0.3, 0.7], scale: [0.7, 1.1], weight: 2.2 },
  { src: 'jellyfish.png',   w: 70,  min: 5, max: 9,  speed: [0.1, 0.25], scale: [0.8, 1.6], weight: 4.5, jelly: true },
  { src: 'shark.png',       w: 365, min: 7, max: 9,  speed: [1.1, 2.0], scale: [0.8, 1.2], weight: 5.5 },
  { src: 'lanternfish.png', w: 157, min: 8, max: 9,  speed: [0.4, 0.9], scale: [0.7, 1.2], weight: 5.5 },
  { src: 'oarfish.png',     w: 731, min: 8, max: 9,  speed: [0.5, 0.9], scale: [0.7, 1.0], weight: 4.5 }
];
function pickFishType(){
  // 依目前層數篩選可出現的魚種，再按權重隨機抽一種
  // seedLevel = 下潛中「即將抵達」的層數，預先生成的魚要用新層數的魚種
  var lv = G.inRound ? Math.max(G.level, G.seedLevel || 0) : 0;
  var pool = [];
  var totalW = 0;
  var weights = [];
  for (var i = 0; i < FISH_TYPES.length; i++){
    var t = FISH_TYPES[i];
    if (lv >= t.min && lv <= t.max){
      var w = t.weight;
      if (t.jelly) w += Math.max(0, lv - 5) * 2.0;   // 水母越深越多（第5層基本量，之後每層遞增）
      pool.push(t); weights.push(w); totalW += w;
    }
  }
  var r = Math.random() * totalW;
  for (var j = 0; j < pool.length; j++){
    r -= weights[j];
    if (r <= 0) return pool[j];
  }
  return pool[pool.length - 1] || FISH_TYPES[0];
}

function spawnFish(inField, yShift, forceSrc){
  // inField = true：直接出現在畫面內（開場、捲動後補魚用）
  //           false／不填：從畫面左右兩側游進來（平常的自然生成）
  // yShift：整體垂直偏移，用來預先生成在畫面下方等著被捲進來
  // forceSrc：指定魚種檔名（例如水母加量器直接指定 jellyfish.png）
  var type = null;
  if (forceSrc){
    for (var ti = 0; ti < FISH_TYPES.length; ti++){
      if (FISH_TYPES[ti].src === forceSrc){ type = FISH_TYPES[ti]; break; }
    }
  }
  if (!type) type = pickFishType();
  var img = document.createElement('img');
  var toRight = Math.random() < 0.5;
  img.src = 'image/' + type.src;
  img.className = 'fish';
  var scale = type.scale[0] + Math.random() * (type.scale[1] - type.scale[0]);
  var drawW = type.w * scale;
  // 下潛後魚群可游過整個畫面；水面時只出現在海面以下。
  var y = G.inRound ? 60 + Math.random() * 1740 : 820 + Math.random() * 900;
  y += (yShift || 0);   // 預先生成在畫面外（捲動時會被捲進來）
  var f = {
    el: img,
    // 從側邊進場時，起點要退到「自己的寬度」之外（大魚如皇帶魚很寬）
    x: inField ? 60 + Math.random() * 960 : (toRight ? -(drawW + 20) : 1170),
    y: y,
    speed: (type.speed[0] + Math.random() * (type.speed[1] - type.speed[0])) * (toRight ? 1 : -1),
    w: drawW,
    scale: scale
  };
  if (type.jelly){
    // 水母：幾乎不橫移，緩緩上飄＋左右搖曳，且不翻轉
    f.speed = f.speed * 0.3;
    f.vy = -(0.15 + Math.random() * 0.25);
    f.sway = Math.random() * Math.PI * 2;
    f.baseX = f.x;
  }
  img.style.width = drawW + 'px';
  img.style.left = f.x + 'px';   // 生成當下就定位，避免在畫面左緣閃現一幀
  img.style.top = y + 'px';
  // 素材的魚頭都朝左；往右游要左右翻轉（水母除外）
  img.style.transform = (!type.jelly && toRight) ? 'scaleX(-1)' : '';
  $('fishLayer').appendChild(img);
  fishes.push(f);
}

function spawnBubble(inField, yShift){
  // inField = true：直接出現在畫面內；false／不填：從畫面底部升上來
  // yShift：整體垂直偏移，用來預先生成在畫面下方等著被捲進來
  var img = document.createElement('img');
  var big = Math.random() < 0.4;
  img.src = 'image/' + (big ? 'Bubbles.png' : 'Bubbles02.png');
  img.className = 'bubble';
  var topLimit = G.inRound ? 80 : 800;   // 水面待機時泡泡只出現在水裡
  var yy = (inField ? topLimit + Math.random() * (1820 - topLimit) : 1880) + (yShift || 0);
  var b = {
    el: img,
    x: 60 + Math.random() * 960,
    y: yy,
    speed: 0.5 + Math.random() * 1.2,
    sway: Math.random() * Math.PI * 2
  };
  img.style.left = b.x + 'px';
  img.style.top = b.y + 'px';    // 生成當下就定位，避免在畫面上緣閃現一幀
  $('bubbleLayer').appendChild(img);
  bubbles.push(b);
}

/* ===== 一次補一批魚和泡泡（開場用、或預先生成在畫面下方等被捲進來） =====
   上限放寬一點：預先生成時畫面上的舊魚還沒被捲走，兩批會短暫共存，
   捲動結束後舊的會被清掉，數量就回到正常。 */
/* ===== 水母加量器：從畫面底部生成一隻水母，加快上升速度飄進畫面 ===== */
function spawnBoostJelly(){
  spawnFish(true, 0, 'jellyfish.png');
  var f = fishes[fishes.length - 1];
  if (!f) return;
  f.y = 1950 + Math.random() * 200;          // 出生在畫面底部下方
  f.vy = -(0.5 + Math.random() * 0.6);       // 升速比一般水母快，才進得了畫面
  f.x = 60 + Math.random() * 960;
  f.el.style.top = f.y + 'px';
  f.el.style.left = f.x + 'px';
}

function seedAmbient(nFish, nBubbles, yShift){
  for (var i = 0; i < nFish; i++){
    if (fishes.length < 30) spawnFish(true, yShift);   // 上限要比水母的高，混合魚群才一定補得進來
  }
  for (var j = 0; j < nBubbles; j++){
    if (bubbles.length < 40) spawnBubble(true, yShift);
  }
}

/* ===== 場景捲動時，魚和泡泡跟著被捲動 =====
   捲動的進度曲線用跟礁岩一樣的 ease-in-out，看起來完全同步 */
var ambientScroll = { active: false, amount: 0, dur: 0, t: 0, applied: 0 };
function scrollAmbient(amount, ms, noSeed){
  ambientScroll = { active: true, amount: amount, dur: ms, t: 0, applied: 0 };
  if (noSeed) return;   // 9→10 最終下潛：不補新魚群，讓海底淨空給鐵達尼號
  if (amount < 0){
    // 下潛：先把下一批魚和泡泡生成在畫面下方（偏移 = 捲動距離），
    // 捲動時它們跟著整個場景一起被捲進畫面，不會憑空冒出來
    seedAmbient(G.inRound ? 9 : 4, 8, -amount);   // 下潛時多補一些，畫面才不會越潛越空
    // 第 5 層起：額外預先生成一批水母（一起被捲進畫面，下捲完成馬上看得到）
    var lv = G.inRound ? Math.max(G.level, G.seedLevel || 0) : 0;
    if (lv >= 5){
      var extra = 2 + (lv - 5);   // 第5層+2隻 → 第9層+6隻
      for (var e = 0; e < extra; e++){
        if (fishes.length < 26) spawnFish(true, -amount, 'jellyfish.png');
      }
    }
  } else {
    // 浮回水面：新內容從畫面上方進來會穿過天空，不好看，改成捲完再補
    setTimeout(function(){ seedAmbient(4, 8, 0); }, ms + 80);
  }
}
function easeInOutQuad(p){
  return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
}

function tick(now){
  // 幀率校正：以 60fps 為基準，上限 3（跟苦艾與甘露同一套做法）
  var factor = Math.min((now - lastTime) / (1000 / 60), 3);
  lastTime = now;

  // 場景捲動：把這一幀該移動的距離，套用到所有魚和泡泡身上
  if (ambientScroll.active){
    ambientScroll.t += factor * (1000 / 60);
    var p = Math.min(ambientScroll.t / ambientScroll.dur, 1);
    var cur = ambientScroll.amount * easeInOutQuad(p);
    var dy = cur - ambientScroll.applied;
    ambientScroll.applied = cur;
    for (var a = 0; a < fishes.length; a++){
      fishes[a].y += dy;
      fishes[a].el.style.top = fishes[a].y + 'px';
    }
    for (var c = 0; c < bubbles.length; c++){
      bubbles[c].y += dy;   // 泡泡的畫面位置在下面的泡泡迴圈會更新
    }
    if (p >= 1) ambientScroll.active = false;
  }

  // 魚
  for (var i = fishes.length - 1; i >= 0; i--){
    var f = fishes[i];
    f.x += f.speed * factor;
    if (f.vy){
      // 水母：緩緩上飄＋左右搖曳
      f.y += f.vy * factor;
      f.sway += 0.02 * factor;
      f.el.style.top = f.y + 'px';
      f.el.style.left = (f.x + Math.sin(f.sway) * 18) + 'px';
    } else {
      f.el.style.left = f.x + 'px';
    }
    // 出界清除：左右界限依「自己的寬度」放寬（皇帶魚等大魚才不會半路消失）
    var margin = (f.w || 120) + 60;
    if (f.x < -margin || f.x > 1080 + margin ||
        (!ambientScroll.active && (f.y < -200 || f.y > 2050))){
      f.el.remove();
      fishes.splice(i, 1);
    }
  }
  // 泡泡
  for (var j = bubbles.length - 1; j >= 0; j--){
    var b = bubbles[j];
    b.y -= b.speed * factor;
    b.sway += 0.03 * factor;
    b.el.style.top = b.y + 'px';
    b.el.style.left = (b.x + Math.sin(b.sway) * 12) + 'px';
    if (!ambientScroll.active && b.y < (G.inRound ? -180 : 740)){
      b.el.remove();
      bubbles.splice(j, 1);
    }
  }

  // 隨機生出新的魚和泡泡（機率也乘上幀率校正）
  // 下潛中魚的生成率和數量上限都提高（深海生物較多）。
  // 捲動進行中暫停自然生成：中途出生的魚吃不到完整捲動量，
  // 會像定在原地跟著潛水艇下潛，很出戲（捲動時已有預先補魚機制）。
  // 最終下潛（9→10 到浮回水面前）完全不生成新魚群，讓海底留給鐵達尼號
  if (!ambientScroll.active && !inFinalDive){
    if (Math.random() < (G.inRound ? 0.028 : 0.012) * factor && fishes.length < (G.inRound ? 17 : 8)) spawnFish();
    // 水母加量：第 5 層以下額外從畫面底部生成水母升上來，越深機率越高。
    // 水母會久留畫面，上限設低（18），才不會把其他魚的生成空間全占滿
    if (G.inRound && G.level >= 5 && fishes.length < 18 &&
        Math.random() < (0.012 + (G.level - 5) * 0.005) * factor){
      spawnBoostJelly();
    }
    if (Math.random() < 0.03 * factor && bubbles.length < 25) spawnBubble();
  }

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ===== 開場 ===== */
updateSoundLabel();
scheduleSeagull();
refresh();
seedAmbient(6, 14);   // 一進遊戲畫面裡就有魚和泡泡，不用等牠們慢慢長出來
</script>
